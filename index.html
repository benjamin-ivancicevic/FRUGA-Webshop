<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Fruga Getränkemarkt | Lieferservice</title>
    
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<header class="navbar">
        
        <div class="logo-bereich">
            <img src="images/logo.png" alt="Fruga Logo" class="shop-logo">
            <span class="shop-name">Fruga</span>
        </div>

        <div class="such-bereich">
            <input type="text" id="suchfeld" placeholder="Getränk suchen...">
            <button id="such-button">🔍</button>
        </div>

        <div class="warenkorb-bereich">
            <a href="warenkorb.html" class="warenkorb-link">
                🛒 Warenkorb <span id="warenkorb-zaehler" class="badge">0</span>
            </a>
        </div>

    </header>

    <main id="produkt-liste">
        <p>Lade Getränke...</p>
    </main>
    <script src="JS/warenkorb.js"></script>
    <script src="JS/checkout.js"></script>
    <script src="JS/app.js"></script>
    
    
</body>
</html>
