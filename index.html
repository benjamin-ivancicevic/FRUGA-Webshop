<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Fruga Getränkemarkt | Lieferservice</title>
    
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<header class="navbar">
        
        <div class="logo-bereich">
            <img src="images/icons/LogoKlein.png" alt="Fruga Logo" class="shop-logo">
            
        </div>

       <section class="such-container">
    <input type="text" id="suchfeld" placeholder="Getränk suchen (z.B. Spezi)...">
    <button id="such-button">Suchen</button>
    </section>

        <div class="warenkorb-bereich">
            <a href="warenkorb.html" class="warenkorb-link">
                🛒 Warenkorb <span id="warenkorb-zaehler" class="badge">0</span>
            </a>
        </div>

    </header>

    <main>
        <section class="angebots-banner">
            <h2>Willkommen bei Fruga!</h2>
            <p>Dein schneller Getränkelieferservice in der Region.</p>
        </section>

        <section class="kategorie-grid" id="kategorie-auswahl">
            <div class="kategorie-karte" data-kategorie="bier">
                <h3>🍺 Biere</h3>
            </div>
            <div class="kategorie-karte" data-kategorie="wasser">
                <h3>💧 Wasser</h3>
            </div>
            <div class="kategorie-karte" data-kategorie="limo_schorle">
                <h3>🍋 Limos & Schorlen</h3>
            </div>
            <div class="kategorie-karte" data-kategorie="saft">
                <h3>🍎 Säfte</h3>
            </div>
            <div class="kategorie-karte" data-kategorie="wein_spirituosen">
                <h3>🍷 Wein & Spirituosen</h3>
            </div>
        </section>

        <section id="produkt-liste" class="produkte-grid">
            </section>
    </main>
    <script src="JS/warenkorb.js"></script>
    <script src="JS/checkout.js"></script>
    <script src="JS/app.js"></script>
    
    
</body>
</html>
